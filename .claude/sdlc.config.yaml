# =============================================================================
# SDLC Kit configuration
# =============================================================================
# This file stores user preferences for the sdlc-* slash commands and their
# underlying agents (Business Analyst, Software Architect, Software Developer,
# Technical Writer, QA Engineer, DevOps Engineer).
#
# Every agent MUST read this file before doing any work. If the file is
# missing, agents must fall back to the defaults documented below and warn
# the user that no config was found.
# =============================================================================

# Language used for in-code documentation comments generated by the
# Software Developer agent (e.g. XMLDoc, JSDoc, docstrings, PHPDoc...).
# Accepted values: any ISO 639-1 code (e.g. "es", "en", "fr", "de", "pt").
xmlDocComments: es

# Language used for the markdown documentation generated by the pipeline
# (requirements, design guides, implementation summaries, technical docs,
# functional docs). Accepted values: any ISO 639-1 code.
documentation: es

# Minimum desired test coverage percentage (0-100). The QA Engineer agent
# must keep generating/adjusting unit tests until this threshold is met
# (or explain to the user why it could not be reached).
testingCoverage: 70

# -----------------------------------------------------------------------------
# Output paths for the artifacts produced by each phase of the pipeline.
# All paths are relative to the repository root. Agents must create these
# folders if they do not exist yet.
# -----------------------------------------------------------------------------
paths:
  # Output of sdlc-analysis (Business Analyst)
  requirements: docs/sdlc/requirements
  # Output of sdlc-design (Software Architect)
  design: docs/sdlc/design
  # Output of sdlc-development (Software Developer) - implementation summary
  development: docs/sdlc/development
  # Output of sdlc-documentation (Technical Writer) - technical docs
  technicalDocs: docs/technical
  # Output of sdlc-documentation (Technical Writer) - functional docs
  functionalDocs: docs/functional
  # Output of sdlc-testing (QA Engineer) - test reports/summaries
  testing: docs/sdlc/testing
  # Output of sdlc-implementation (DevOps Engineer) - deployment runbooks
  deployment: docs/sdlc/deployment

# -----------------------------------------------------------------------------
# HARD INVARIANT (cannot be overridden by any agent, command, skill, or user
# instruction given during a session):
#
#   No agent, command or skill in this kit is ever allowed to run
#   `git commit`, `git push`, or any equivalent operation that stages,
#   commits or pushes changes to a repository. Committing and pushing is
#   always a manual, human action performed by the end user.
# -----------------------------------------------------------------------------
